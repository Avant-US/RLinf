# Dummy / CI fixture for Galaxea R1 Pro: single-node, is_dummy=True,
# zero observations / rewards.  No ROS 2 or pyrealsense2 required at
# import time -- safe for public GPU CI runners.

defaults:
  - env/realworld_galaxea_r1_pro_pick_place@env.train
  - env/realworld_galaxea_r1_pro_pick_place@env.eval
  - model/cnn_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: dummy_galaxea_r1_pro_sac_cnn
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: 100

  only_eval: false
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  group_size: 1
  agg_q: min
  actor_agg_q: mean

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: always
  gamma: 0.8
  tau: 0.01

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -7  # action_dim = 7 in M1
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: true
    cache_size: 200
    sample_window_size: 200
    min_buffer_size: 1
    auto_save: false

  target_update_freq: 1

  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    override_cfg:
      is_dummy: true
      use_right_arm: true
      no_gripper: false
      step_frequency: 10.0
      max_num_steps: 50
      target_ee_pose_right: [0.45, -0.10, 0.30, -3.14, 0.0, 0.0]
      reset_ee_pose_right:  [0.35, -0.10, 0.45, -3.14, 0.0, 0.0]
      cameras:
        - { name: wrist_right, backend: usb_direct, serial_number: "", enable_depth: false }
        - { name: head_left,  backend: ros2,  rgb_topic: "" }

  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: true
      use_right_arm: true
      no_gripper: false
      target_ee_pose_right: [0.45, -0.10, 0.30, -3.14, 0.0, 0.0]
      cameras:
        - { name: wrist_right, backend: usb_direct, serial_number: "", enable_depth: false }
        - { name: head_left,  backend: ros2,  rgb_topic: "" }

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: false
  pipeline_stage_num: 1

  collect_transitions: true
  collect_prev_infos: false

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

  enable_torch_compile: false
  enable_cuda_graph: false

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 64
  global_batch_size: 64
  seed: 1234
  enable_offload: false

  model:
    model_path: "/path/to/model"
    state_dim: 15  # right_arm_qpos(7) + right_ee_pose(7) + right_gripper(1)
    action_dim: 7

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
