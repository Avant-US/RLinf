# All-ROS 2 variant: both wrist and head cameras travel via ROS 2.
# Use this when the wrist USB cable cannot reach the GPU server
# (mobile / remote / PoC).  See appendix F of r1pro5op47.md.

defaults:
  - env/realworld_galaxea_r1_pro_pick_place_all_ros2@env.train
  - env/realworld_galaxea_r1_pro_pick_place_all_ros2@env.eval
  - model/cnn_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: gpu
      placement: 0
    rollout:
      node_group: gpu
      placement: 0
    reward:
      node_group: gpu
      placement: 0
    env:
      node_group: gpu
      placement: 0
  node_groups:
    - label: gpu
      node_ranks: 0
      hardware:
        type: GalaxeaR1Pro
        configs:
          - node_rank: 0
            ros_domain_id: 72
            ros_localhost_only: false
            galaxea_install_path: /opt/galaxea/install
            use_right_arm: true
            controller_node_rank: 1
            camera_node_rank: 0
            wrist_direct_camera_serials: {}  # all-ros2: empty
            cameras:
              - name: wrist_right
                backend: ros2
                rgb_topic: /hdas/camera_wrist_right/color/image_raw/compressed
                depth_topic: /hdas/camera_wrist_right/aligned_depth_to_color/image_raw
                resolution: [640, 480]
                fps: 30
                enable_depth: true
                stale_threshold_ms: 250
              - name: head_left
                backend: ros2
                rgb_topic: /hdas/camera_head/left_raw/image_raw_color/compressed
                depth_topic: /hdas/camera_head/depth/depth_registered
                resolution: [1280, 720]
                fps: 30
                enable_depth: false
                stale_threshold_ms: 250
            bms_low_battery_threshold: 25.0
            stale_threshold_ms: 250
            disable_validate: false
    - label: galaxea_r1_pro
      node_ranks: 1
      hardware:
        type: GalaxeaR1Pro
        configs:
          - node_rank: 1
            ros_domain_id: 72
            galaxea_install_path: /home/galaxea/galaxea/install
            use_right_arm: true
            controller_node_rank: 1
            wrist_direct_camera_serials: {}
            disable_validate: false

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: galaxea_r1_pro_right_arm_rlpd_cnn_async_all_ros2
    logger_backends: ["tensorboard"]

  max_epochs: 8000
  max_steps: -1
  only_eval: false
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  enable_drq: false
  backup_entropy: false
  critic_subsample_size: 2
  eval_rollout_epoch: 1
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -7
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0
  critic_actor_ratio: 4
  replay_buffer:
    enable_cache: true
    cache_size: 200
    min_buffer_size: 2
    sample_window_size: 200
    auto_save: false
  demo_buffer:
    enable_cache: true
    cache_size: 200
    min_buffer_size: 1
    sample_window_size: 200
    load_path: /data/galaxea_r1_pro_demo
    auto_save: false
  target_update_freq: 1
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: EnvGroup
  train:
    ignore_terminations: false
    total_num_envs: 1
    override_cfg:
      is_dummy: false
      use_right_arm: true
      no_gripper: false
      # Lower control frequency due to ROS 2 latency on wrist cameras.
      step_frequency: 8.0
      soft_sync_window_ms: 50
      align_strategy: sync_window
      fallback_to_ros2_on_usb_drop: false
      max_num_steps: 200
      action_scale: [0.04, 0.10, 1.0]
      target_ee_pose_right: [0.45, -0.10, 0.30, -3.14, 0.0, 0.0]
      reset_ee_pose_right: [0.35, -0.10, 0.45, -3.14, 0.0, 0.0]
      reward_threshold: [0.02, 0.02, 0.02, 0.20, 0.20, 0.20]
      use_dense_reward: false
      success_hold_steps: 5
      use_reward_model: false
      reward_image_key: wrist_right
      cameras:
        - name: wrist_right
          backend: ros2
          rgb_topic: /hdas/camera_wrist_right/color/image_raw/compressed
          depth_topic: /hdas/camera_wrist_right/aligned_depth_to_color/image_raw
          resolution: [640, 480]
          fps: 30
          enable_depth: true
          stale_threshold_ms: 250
        - name: head_left
          backend: ros2
          rgb_topic: /hdas/camera_head/left_raw/image_raw_color/compressed
          depth_topic: /hdas/camera_head/depth/depth_registered
          resolution: [1280, 720]
          fps: 30
          enable_depth: false
          stale_threshold_ms: 250
      safety_cfg:
        bms_low_battery_threshold_pct: 25.0
        max_linear_step_m: 0.04
        max_angular_step_rad: 0.16
        feedback_stale_threshold_ms: 250
        right_ee_min: [0.20, -0.35, 0.05, -3.20, -0.30, -0.30]
        right_ee_max: [0.65,  0.35, 0.65,  3.20,  0.30,  0.30]
  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: false
      use_right_arm: true

rollout:
  group_name: RolloutGroup
  backend: huggingface
  enable_offload: false
  pipeline_stage_num: 1
  sync_weight_nccl_max_ctas: 32
  collect_transitions: true
  collect_prev_infos: false
  model:
    model_path: /path/to/model
    precision: ${actor.model.precision}
    num_q_heads: 10
  enable_torch_compile: true
  enable_cuda_graph: false

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 256
  global_batch_size: 256
  seed: 1234
  enable_offload: false
  model:
    model_path: /path/to/model
    state_dim: 15
    action_dim: 7
    num_q_heads: 10
  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant
  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant
  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false
  group_name: RewardGroup

critic:
  use_critic_model: false
