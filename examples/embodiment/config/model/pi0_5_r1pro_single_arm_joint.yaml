# Pi0.5 model config for the Galaxea R1 Pro single-arm joint task.
#
# Per design doc r1pro6op47.md §5 / §8.2.  Uses the OpenPI integration
# (model_type=openpi); the openpi.config_name selects a R1-Pro-specific
# dataconfig that knows action_dim=8 (7 joints + 1 gripper) and
# image_keys=("wrist_image_right",).
#
# When the task is no_gripper=true (M1 SingleArmReach-joint), the
# action layout is just 7 joints (no gripper); set action_dim=7 here
# accordingly.  For the M3 SingleArmPick task, set action_dim=8.

model_type: "openpi"

# Path to the SFT checkpoint produced by train_vla_sft.py with the
# galaxea_r1pro_singlearm_reach_sft_joint config.
model_path: "/path/to/checkpoints/pi05_r1pro_singlearm_reach_joint"

precision: null   # openpi handles dtype internally; leave null

# Action and chunk settings (Orin-friendly: shorter chunks, smaller LoRA)
num_action_chunks: 4
action_dim: 7     # 7 joints; add +1 for gripper when no_gripper=false

# LoRA enabled for Orin VRAM budget; full-finetune still possible on a
# GPU server in form A.
is_lora: true
lora_rank: 16

use_proprio: true
num_steps: 5
add_value_head: false

openpi:
  # Custom dataconfig for R1 Pro single-arm joint mode.  Falls back to
  # pi05_libero if not registered; users should register a r1pro one
  # via rlinf/models/embodiment/openpi/r1pro_dataconfig.py per §5.3.
  config_name: "pi05_r1pro_single_arm_joint"
  num_images_in_input: 1   # wrist_right only (Orin friendly)
  noise_level: 0.5
  action_chunk: ${actor.model.num_action_chunks}
  num_steps: ${actor.model.num_steps}
  train_expert_only: true
  action_env_dim: ${actor.model.action_dim}
  noise_method: "flow_sde"
  add_value_head: ${actor.model.add_value_head}
  value_after_vlm: false
  value_vlm_mode: "mean_token"
  detach_critic_input: null
